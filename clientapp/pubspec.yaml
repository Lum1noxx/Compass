name: clientapp
description: "Compass app"
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.3.0
  geolocator: ^12.0.0
  http: ^1.6.0
  latlong2: ^0.9.1
  url_launcher: ^6.3.2
  expandable: 5.0.1
  woozy_search: ^2.0.3
  cupertino_icons: ^1.0.9
  flutter_launcher_icons: ^0.14.4
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  test: ^1.30.0

flutter:
  uses-material-design: true
  assets:
    - assets/json/destinations.json
    - assets/floorplans/
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/compass_light.png"
  web:
    generate: true
    image_path: "assets/icon/compass_light.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/icon/compass_light.png"
    icon_size: 128 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon/compass_light.png"